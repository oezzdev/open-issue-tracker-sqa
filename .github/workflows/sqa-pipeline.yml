name: Android CI – Unit Tests & SonarCloud

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-and-analyze:
    name: Unit Tests & SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:

      # ─── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # requerido por SonarCloud

      # ─── 2. JDK 8 ───────────────────────────────────────────────────────────
      # compileSdkVersion 27 + buildToolsVersion 27.0.3 implican AGP 2.x/3.x.
      # Ese rango de AGP parsea java.version esperando exactamente "1.x" o "x.y"
      # y falla con versiones de 3 segmentos (11.0.x, 17.0.x). JDK 8 es el
      # único que reporta "1.8.0_xxx", compatible sin patches.
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      # ─── 3. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle & Android caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─── 4. Permisos de gradlew ──────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ─── 5. Pruebas unitarias ────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # ─── 6. Reporte de cobertura JaCoCo ─────────────────────────────────────
      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport --stacktrace

      # ─── 7. Publicar resultados de pruebas ───────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/

      # ─── 8. Publicar reporte de cobertura ────────────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/

      # ─── 9. JDK 17 para SonarCloud ──────────────────────────────────────────
      # El scanner de SonarCloud requiere JDK 17+. Instalamos un segundo JDK
      # SIN sobreescribir JAVA_HOME del build; lo referenciamos manualmente.
      - name: Set up JDK 17 for SonarCloud scanner
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── 10. SonarCloud ──────────────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=jmontesino_open-issue-tracker-sqa
            -Dsonar.organization=jmontesino
            -Dsonar.sources=app/src/main
            -Dsonar.tests=app/src/test
            -Dsonar.java.binaries=app/build/intermediates/javac/debug/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
            -Dsonar.java.source=8