name: Android CI – Unit Tests & SonarCloud

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-and-analyze:
    name: Unit Tests & SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:

      # ─── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # SonarCloud necesita el historial completo para calcular blame / nuevas líneas
          fetch-depth: 0

      # ─── 2. JDK ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ─── 3. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle & Android caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─── 4. Permisos de gradlew ──────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ─── 5. Pruebas unitarias con cobertura (JaCoCo) ─────────────────────────
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest jacocoTestReport --stacktrace
        # Si el proyecto no tiene aún la tarea jacocoTestReport configurada,
        # usa solo: ./gradlew testDebugUnitTest --stacktrace

      # ─── 6. Publicar resultados de pruebas como artefacto ────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/

      # ─── 7. Publicar reporte de cobertura como artefacto ─────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/

      # ─── 8. SonarCloud ───────────────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # acceso a PR info
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}      # secreto en tu repo
        with:
          args: >
            -Dsonar.projectKey=jmontesino_open-issue-tracker-sqa
            -Dsonar.organization=jmontesino
            -Dsonar.sources=app/src/main
            -Dsonar.tests=app/src/test
            -Dsonar.java.binaries=app/build/intermediates/javac/debug/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
            -Dsonar.java.source=17