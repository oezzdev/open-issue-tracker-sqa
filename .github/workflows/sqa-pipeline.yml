name: Android CI – Unit Tests & SonarCloud

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-and-analyze:
    name: Unit Tests & SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:

      # ─── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── 2. JDK 8 (requerido por AGP 2.x/3.x con compileSdkVersion 27) ─────
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      # ─── 3. Instalar Android SDK 27 limpio ──────────────────────────────────
      # El runner ubuntu-latest trae SDK moderno (API 33+) con XMLs que usan
      # <extension-level>, campo desconocido para el AGP antiguo de este proyecto.
      # Sobreescribimos ANDROID_HOME con un SDK mínimo (solo lo que necesitamos).
      - name: Set up Android SDK 27
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platforms;android-27
            build-tools;27.0.3
            platform-tools

      # ─── 4. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle & Android caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─── 5. Permisos de gradlew ──────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ─── 6. Verificar entorno (útil para depurar) ────────────────────────────
      - name: Show environment info
        run: |
          java -version
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "$ANDROID_HOME/platforms/" || true
          ls "$ANDROID_HOME/build-tools/" || true

      # ─── 7. Pruebas unitarias ────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # ─── 8. Reporte de cobertura JaCoCo ─────────────────────────────────────
      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport --stacktrace

      # ─── 9. Publicar resultados de pruebas ───────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/

      # ─── 10. Publicar reporte de cobertura ───────────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/

      # ─── 11. JDK 17 para SonarCloud (requiere mínimo JDK 17) ────────────────
      - name: Set up JDK 17 for SonarCloud scanner
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── 12. SonarCloud ──────────────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=jmontesino_open-issue-tracker-sqa
            -Dsonar.organization=jmontesino
            -Dsonar.sources=app/src/main
            -Dsonar.tests=app/src/test
            -Dsonar.java.binaries=app/build/intermediates/javac/debug/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
            -Dsonar.java.source=8