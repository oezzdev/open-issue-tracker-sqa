name: Android CI – Unit Tests & SonarCloud

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-and-analyze:
    name: Unit Tests & SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:

      # ─── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # requerido por SonarCloud

      # ─── 2. JDK 11 ──────────────────────────────────────────────────────────
      # El AGP antiguo de ForkHub falla con JDK 17+ porque no reconoce
      # versiones de 3 segmentos como "17.0.19". JDK 11 es la versión
      # máxima compatible con ese rango de AGP (2.x / 3.x).
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      # ─── 3. Forzar JAVA_HOME para que Gradle lo detecte correctamente ────────
      # Algunos AGP viejos leen la versión de java.version del sistema
      # y pueden confundirse si hay un JDK residual. Exportamos explícitamente.
      - name: Set JAVA_HOME explicitly
        run: echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      # ─── 4. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle & Android caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─── 5. Permisos de gradlew ──────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ─── 6. Pruebas unitarias ────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # ─── 7. Reporte de cobertura JaCoCo ─────────────────────────────────────
      # Si el proyecto no tiene la tarea jacocoTestReport, este paso fallará
      # con gracia (continue-on-error). Añade la configuración de JaCoCo
      # a app/build.gradle si quieres cobertura real en SonarCloud.
      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport --stacktrace
        continue-on-error: true

      # ─── 8. Publicar resultados de pruebas ───────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/

      # ─── 9. Publicar reporte de cobertura ────────────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/

      # ─── 10. SonarCloud ──────────────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=jmontesino_open-issue-tracker-sqa
            -Dsonar.organization=jmontesino
            -Dsonar.sources=app/src/main
            -Dsonar.tests=app/src/test
            -Dsonar.java.binaries=app/build/intermediates/javac/debug/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
            -Dsonar.java.source=8