name: Android CI – Unit Tests & SonarCloud

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-and-analyze:
    name: Unit Tests & SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:

      # ─── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── 2. JDK 17 primero — sdkmanager lo necesita ─────────────────────────
      - name: Set up JDK 17 (for sdkmanager + SonarCloud)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ─── 3. Instalar SDK 27 limpio con sdkmanager ───────────────────────────
      # El runner trae SDKs modernos (API 33+) con <extension-level> en sus
      # package.xml — campo desconocido para el AGP 2.x/3.x de este proyecto.
      # Instalamos solo API 27 + build-tools 27.0.3 y apuntamos ANDROID_HOME
      # a un directorio propio para que el AGP no vea las plataformas modernas.
      - name: Install Android SDK 27 via sdkmanager
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-27" "build-tools;27.0.3" "platform-tools"

      # ─── 4. Eliminar plataformas modernas del SDK del runner ────────────────
      # Borramos todas las plataformas excepto android-27 para que el AGP
      # antiguo no parsee los XMLs con <extension-level>.
      - name: Remove modern SDK platforms (keep only android-27)
        run: |
          PLATFORMS_DIR="$ANDROID_SDK_ROOT/platforms"
          for dir in "$PLATFORMS_DIR"/*/; do
            platform=$(basename "$dir")
            if [ "$platform" != "android-27" ]; then
              echo "Removing $platform"
              rm -rf "$dir"
            fi
          done
          echo "Remaining platforms:"
          ls "$PLATFORMS_DIR"

      # ─── 5. Bajar a JDK 8 para el build (AGP 2.x/3.x) ──────────────────────
      # Después de usar sdkmanager con JDK 17, bajamos a JDK 8 para que
      # el AGP no falle al parsear la versión de Java.
      - name: Switch to JDK 8 for Gradle build
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # ─── 6. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle & Android caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─── 7. Permisos de gradlew ──────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ─── 8. Verificar entorno ────────────────────────────────────────────────
      - name: Show environment info
        run: |
          java -version
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "$ANDROID_SDK_ROOT/platforms/"
          ls "$ANDROID_SDK_ROOT/build-tools/"

      # ─── 9. Pruebas unitarias ────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # ─── 10. Reporte de cobertura JaCoCo ─────────────────────────────────────
      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport --stacktrace

      # ─── 11. Publicar resultados de pruebas ──────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/

      # ─── 12. Publicar reporte de cobertura ───────────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/

      # ─── 13. Volver a JDK 17 para SonarCloud ─────────────────────────────────
      - name: Switch back to JDK 17 for SonarCloud
        if: always()
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── 14. SonarCloud ──────────────────────────────────────────────────────
      - name: SonarCloud Scan
        if: always()
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=jmontesino_open-issue-tracker-sqa
            -Dsonar.organization=jmontesino
            -Dsonar.sources=app/src/main
            -Dsonar.tests=app/src/test
            -Dsonar.java.binaries=app/build/intermediates/javac/debug/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
            -Dsonar.java.source=8